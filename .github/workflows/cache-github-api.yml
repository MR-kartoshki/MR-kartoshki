name: Cache GitHub API data

on:
  workflow_dispatch:
  schedule:
    # Refresh cache every 5 minutes.
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.head_commit.author.name != 'github-actions[bot]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate cache payload
        id: generate
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const username = "MR-kartoshki";
            const repos = [];
            const perPage = 100;

            for (let page = 1; ; page += 1) {
              const { data } = await github.rest.repos.listForUser({
                username,
                sort: "updated",
                direction: "desc",
                per_page: perPage,
                page,
              });

              repos.push(...data);

              if (data.length < perPage) {
                break;
              }
            }

            const repoLanguages = {};
            let hasIncompleteLanguageData = false;

            for (const repo of repos) {
              try {
                const { data: languagesPayload } = await github.rest.repos.listLanguages({
                  owner: repo.owner.login,
                  repo: repo.name,
                });

                repoLanguages[String(repo.id)] = Object.entries(languagesPayload)
                  .filter(([, bytes]) => typeof bytes === "number")
                  .sort(([, leftBytes], [, rightBytes]) => rightBytes - leftBytes)
                  .map(([language]) => language);
              } catch (error) {
                hasIncompleteLanguageData = true;
                repoLanguages[String(repo.id)] = repo.language ? [repo.language] : [];
                core.warning(`Failed to load languages for ${repo.full_name}: ${error.message}`);
              }
            }

            const minimalRepos = repos.map((repo) => ({
              id: repo.id,
              name: repo.name,
              description: repo.description,
              language: repo.language,
              fork: repo.fork,
              stargazers_count: repo.stargazers_count,
              forks_count: repo.forks_count,
              updated_at: repo.updated_at,
              html_url: repo.html_url,
              languages_url: repo.languages_url,
            }));

            const outputPath = path.join(process.env.GITHUB_WORKSPACE, "data", "repos-cache.json");
            fs.mkdirSync(path.dirname(outputPath), { recursive: true });

            const newPayload = {
              username,
              has_incomplete_language_data: hasIncompleteLanguageData,
              repos: minimalRepos,
              repo_languages: repoLanguages,
            };

            let oldPayload = { repos: [], repo_languages: {} };
            const fileExists = fs.existsSync(outputPath);
            if (fileExists) {
              const oldContent = fs.readFileSync(outputPath, "utf8");
              oldPayload = JSON.parse(oldContent);
              delete oldPayload.generated_at;
            }
            core.info(`Cache file exists: ${fileExists}`);
            core.info(`Old repo count: ${(oldPayload.repos || []).length}`);
            core.info(`New repo count: ${newPayload.repos.length}`);

            const payloadChanged = JSON.stringify(newPayload) !== JSON.stringify(oldPayload);

            // Show first repo from each for comparison
            if (newPayload.repos.length > 0) {
              core.info(`Sample new repo: ${JSON.stringify(newPayload.repos[0])}`);
            }
            if (oldPayload.repos.length > 0) {
              core.info(`Sample old repo: ${JSON.stringify(oldPayload.repos[0])}`);
            }

            core.info(`Payload changed: ${payloadChanged}`);

            const payload = {
              generated_at: new Date().toISOString(),
              ...newPayload,
            };

            fs.writeFileSync(outputPath, `${JSON.stringify(payload, null, 2)}\n`, "utf8");
            core.info(`Wrote ${minimalRepos.length} repositories to ${outputPath}`);
            core.setOutput("changed", payloadChanged);

      - name: Commit and push cache changes
        if: steps.generate.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repos-cache.json
          git commit -m "chore: refresh GitHub API cache"
          git push origin HEAD:${{ github.ref_name }}
